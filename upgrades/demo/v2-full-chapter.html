            setupBeatListeners(beatEl, beatData, idx) {
                if (beatData.type === 'beat-quiz') {
                    const options = beatEl.querySelectorAll('.quiz-option');
                    options.forEach((optEl) => {
                        optEl.addEventListener('click', () => {
                            if (beatEl.classList.contains('answered')) return;

                            const optionIdx = optEl.getAttribute('data-option');
                            const isCorrect = beatData.options[optionIdx].correct;

                            options.forEach(o => o.classList.add('answered'));

                            if (isCorrect) {
                                optEl.classList.add('correct');
                                this.awardXP(beatData.xpReward || 25);
                                this.burst({ x: optEl.offsetLeft + 50, y: optEl.offsetTop + 25 });
                            } else {
                                optEl.classList.add('incorrect');
                            }

                            const explanation = beatEl.querySelector('.quiz-explanation');
                            explanation.style.display = 'block';
                            explanation.innerHTML = `
                                <h4>${isCorrect ? 'Correct!' : 'Not quite'}</h4>
                                <p>${beatData.options[optionIdx].explanation}</p>
                            `;
                        });
                    });
                }

                if (beatData.type === 'beat-waterfall') {
                    const toggles = beatEl.querySelectorAll('[data-wf]');
                    toggles.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            toggles.forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            const company = e.target.getAttribute('data-wf');
                            this.drawWaterfall(beatEl.querySelector('#waterfall-chart'), beatData.data[company], beatData.data[company].currency);
                        });
                    });
                    this.drawWaterfall(beatEl.querySelector('#waterfall-chart'), beatData.data.eddie, '£k');
                }

                if (beatData.type === 'beat-radar') {
                    const canvas = beatEl.querySelector('#radar-canvas');
                    const toggles = beatEl.querySelectorAll('[data-radar]');
                    toggles.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            toggles.forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            const highlight = e.target.getAttribute('data-radar');
                            this.drawRadar(canvas, beatData.company1, beatData.company2, highlight);
                        });
                    });
                    this.drawRadar(canvas, beatData.company1, beatData.company2, 'both');
                }

                if (beatData.type === 'beat-revenue-calc') {
                    const priceSlider = beatEl.querySelector('#priceSlider');
                    const volumeSlider = beatEl.querySelector('#volumeSlider');
                    const updateCalc = () => {
                        const price = parseInt(priceSlider.value);
                        const volume = parseInt(volumeSlider.value);
                        const revenue = (price * volume / 1000).toFixed(1);
                        beatEl.querySelector('#priceValue').textContent = price;
                        beatEl.querySelector('#volumeValue').textContent = volume;
                        beatEl.querySelector('#revenueDisplay').textContent = revenue;
                    };
                    priceSlider.addEventListener('input', updateCalc);
                    volumeSlider.addEventListener('input', updateCalc);
                }

                if (beatData.type === 'beat-challenge') {
                    let score = 0;
                    const buttons = beatEl.querySelectorAll('.challenge-item-btn');
                    buttons.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = btn.getAttribute('data-idx');
                            const answer = btn.getAttribute('data-answer');
                            const correct = beatData.items[idx].answer === answer;

                            if (!btn.classList.contains('answered')) {
                                const itemBtns = beatEl.querySelectorAll(`[data-idx="${idx}"]`);
                                const challengeItem = btn.closest('.challenge-item');
                                itemBtns.forEach(b => {
                                    b.classList.add('answered');
                                    if (b.getAttribute('data-answer') === beatData.items[idx].answer) {
                                        b.classList.add('correct');
                                    }
                                });

                                if (correct) {
                                    score++;
                                    this.awardXP(10);
                                    this.burst({ x: btn.offsetLeft, y: btn.offsetTop });
                                }

                                // Show explanation
                                if (beatData.items[idx].explanation) {
                                    const explanationDiv = document.createElement('div');
                                    explanationDiv.className = 'challenge-explanation';
                                    explanationDiv.innerHTML = `<strong>${correct ? 'Correct!' : 'Not quite.'}</strong> ${beatData.items[idx].explanation}`;
                                    challengeItem.appendChild(explanationDiv);
                                }

                                beatEl.querySelector('#challengeScore').textContent = `${score} / ${beatData.items.length}`;
                            }
                        });
                    });
                }

                if (beatData.type === 'beat-adjustment-classifier') {
                    let score = 0;
                    const buttons = beatEl.querySelectorAll('.adjustment-item-btn');
                    buttons.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const idx = btn.getAttribute('data-idx');
                            const answer = btn.getAttribute('data-answer');
                            const correct = beatData.items[idx].answer === answer;

                            if (!btn.classList.contains('answered')) {
                                const itemBtns = beatEl.querySelectorAll(`[data-idx="${idx}"]`);
                                const adjustmentItem = btn.closest('.adjustment-item');
                                itemBtns.forEach(b => {
                                    b.classList.add('answered');
                                    if (b.getAttribute('data-answer') === beatData.items[idx].answer) {
                                        b.classList.add(beatData.items[idx].answer);
                                    }
                                });

                                if (correct) {
                                    score++;
                                    this.awardXP(10);
                                    this.burst({ x: btn.offsetLeft, y: btn.offsetTop });
                                }

                                // Show explanation
                                if (beatData.items[idx].explanation) {
                                    const explanationDiv = document.createElement('div');
                                    explanationDiv.className = 'adjustment-explanation';
                                    explanationDiv.innerHTML = `<strong>${correct ? 'Correct!' : 'Not quite.'}</strong> ${beatData.items[idx].explanation}`;
                                    adjustmentItem.appendChild(explanationDiv);
                                }

                                beatEl.querySelector('#adjustmentScore').textContent = `${score} / ${beatData.items.length}`;
                            }
                        });
                    });
                }

                if (beatData.type === 'beat-breakeven') {
                    const priceSlider = beatEl.querySelector('#bePriceSlider');
                    const canvas = beatEl.querySelector('#breakeven-canvas');
                    const updateBE = () => {
                        const price = parseInt(priceSlider.value);
                        beatEl.querySelector('#bePrice').textContent = price;
                        this.drawBreakeven(canvas, price, beatData.variableCost, beatData.fixedCosts);
                    };
                    priceSlider.addEventListener('input', updateBE);
                    this.drawBreakeven(canvas, beatData.baselinePrice, beatData.variableCost, beatData.fixedCosts);
                }

                if (beatData.type === 'beat-sandbox') {
                    const sliders = {
                        price: beatEl.querySelector('#sbPriceSlider'),
                        volume: beatEl.querySelector('#sbVolumeSlider'),
                        vc: beatEl.querySelector('#sbVCSlider'),
                        fc: beatEl.querySelector('#sbFCSlider'),
                        da: beatEl.querySelector('#sbDASlider')
                    };
                    const updateSandbox = () => {
                        const price = parseInt(sliders.price.value);
                        const volume = parseInt(sliders.volume.value);
                        const vc = parseInt(sliders.vc.value);
                        const fc = sliders.fc.value / 10;
                        const da = sliders.da.value / 10;

                        beatEl.querySelector('#sbPrice').textContent = price;
                        beatEl.querySelector('#sbVolume').textContent = volume;
                        beatEl.querySelector('#sbVC').textContent = vc;
                        beatEl.querySelector('#sbFC').textContent = fc;
                        beatEl.querySelector('#sbDA').textContent = da;

                        const revenue = (price * volume / 1000).toFixed(1);
                        const cogs = (vc * volume / 1000).toFixed(1);
                        const gp = (revenue - cogs).toFixed(1);
                        const opex = 20.6;
                        const ebitda = (gp - opex).toFixed(1);
                        const ebit = (ebitda - da).toFixed(1);
                        const margin = (ebit / revenue * 100).toFixed(1);

                        beatEl.querySelector('#sbRevenue').textContent = revenue;
                        beatEl.querySelector('#sbCOGS').textContent = cogs;
                        beatEl.querySelector('#sbGP').textContent = gp;
                        beatEl.querySelector('#sbOpEx').textContent = opex;
                        beatEl.querySelector('#sbEBITDA').textContent = ebitda;
                        beatEl.querySelector('#sbDAValue').textContent = da;
                        beatEl.querySelector('#sbEBIT').textContent = ebit;
                        beatEl.querySelector('#sbMargin').textContent = margin + '%';
                    };

                    Object.values(sliders).forEach(slider => {
                        slider.addEventListener('input', updateSandbox);
                    });
                    updateSandbox();
                }
            }

            drawWaterfall(container, data, currency) {
                container.innerHTML = '';
                const bars = [
                    { label: 'Revenue', value: data.revenue, color: '#d4a0ff' },
                    { label: 'COGS', value: -data.cogs, color: '#e08577' },
                    { label: 'Gross Profit', value: data.gp, color: '#b07ce8' },
                    { label: 'OpEx', value: -data.opex, color: '#e08577' },
                    { label: 'EBITDA', value: data.ebitda, color: '#4a9e6e' },
                    { label: 'D&A', value: -data.da, color: '#e08577' },
                    { label: 'EBIT', value: data.ebit, color: '#d4a0ff' }
                ];

                const maxVal = Math.max(...bars.map(b => Math.abs(b.value)));
                const barHeight = 300;

                bars.forEach(bar => {
                    const height = Math.abs(bar.value) / maxVal * barHeight;
                    const barEl = document.createElement('div');
                    barEl.className = 'waterfall-bar';
                    barEl.innerHTML = `
                        <div class="waterfall-bar-segment ${bar.value < 0 ? 'waterfall-bar-negative' : ''}" style="height: ${height}px; background: ${bar.value < 0 ? '#e08577' : bar.color};"></div>
                        <div class="waterfall-bar-label">${bar.label}</div>
                        <div class="waterfall-bar-value">${bar.value >= 0 ? '+' : ''}${Math.abs(bar.value)} ${currency}</div>
                    `;
                    container.appendChild(barEl);
                });
            }

            drawRadar(canvas, company1, company2, highlight) {
                const ctx = canvas.getContext('2d');
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const radius = 120;
                const axisLabels = Object.keys(company1.axes);
                const numAxes = axisLabels.length;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0a0a0c';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 1; i <= 5; i++) {
                    const currentRadius = (radius / 5) * i;
                    ctx.beginPath();
                    ctx.strokeStyle = '#2a2a35';
                    ctx.lineWidth = 1;
                    for (let j = 0; j < numAxes; j++) {
                        const angle = (j / numAxes) * Math.PI * 2 - Math.PI / 2;
                        const x = centerX + currentRadius * Math.cos(angle);
                        const y = centerY + currentRadius * Math.sin(angle);
                        if (j === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                for (let i = 0; i < numAxes; i++) {
                    const angle = (i / numAxes) * Math.PI * 2 - Math.PI / 2;
                    const x = centerX + radius * Math.cos(angle);
                    const y = centerY + radius * Math.sin(angle);
                    ctx.beginPath();
                    ctx.strokeStyle = '#2a2a35';
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(x, y);
                    ctx.stroke();

                    const labelX = centerX + (radius + 40) * Math.cos(angle);
                    const labelY = centerY + (radius + 40) * Math.sin(angle);
                    ctx.fillStyle = '#a8a4b0';
                    ctx.font = 'bold 12px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(axisLabels[i], labelX, labelY);
                }

                const drawPolygon = (data, color, alpha) => {
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    for (let j = 0; j < numAxes; j++) {
                        const angle = (j / numAxes) * Math.PI * 2 - Math.PI / 2;
                        const value = data.axes[axisLabels[j]] || 0;
                        const pointRadius = (value / 100) * radius;
                        const x = centerX + pointRadius * Math.cos(angle);
                        const y = centerY + pointRadius * Math.sin(angle);
                        if (j === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                };

                if (highlight === 'both' || highlight === 'konig') {
                    drawPolygon(company1, company1.color, 0.3);
                }
                if (highlight === 'both' || highlight === 'subtrax') {
                    drawPolygon(company2, company2.color, 0.3);
                }
            }

            drawBreakeven(canvas, price, variableCost, fixedCosts) {
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const padding = 60;
                const graphWidth = width - padding * 2;
                const graphHeight = height - padding * 2;
                const maxUnits = 500;
                const breakeven = fixedCosts / (price - variableCost);

                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#0a0a0c';
                ctx.fillRect(0, 0, width, height);

                // Axes
                ctx.strokeStyle = '#2a2a35';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(padding, height - padding);
                ctx.lineTo(width - padding, height - padding);
                ctx.moveTo(padding, height - padding);
                ctx.lineTo(padding, padding);
                ctx.stroke();

                // Grid and labels
                ctx.strokeStyle = '#2a2a35';
                ctx.fillStyle = '#7a7680';
                ctx.font = '12px JetBrains Mono';
                for (let i = 0; i <= 5; i++) {
                    const x = padding + (graphWidth / 5) * i;
                    const units = (maxUnits / 5) * i;
                    ctx.beginPath();
                    ctx.moveTo(x, height - padding);
                    ctx.lineTo(x, height - padding + 5);
                    ctx.stroke();
                    ctx.textAlign = 'center';
                    ctx.fillText(Math.round(units), x, height - padding + 20);

                    const y = height - padding - (graphHeight / 5) * i;
                    ctx.beginPath();
                    ctx.moveTo(padding - 5, y);
                    ctx.lineTo(padding, y);
                    ctx.stroke();
                    ctx.textAlign = 'right';
                    ctx.fillText('€' + (Math.round(units * price) / 100) + 'm', padding - 10, y + 4);
                }

                // Revenue line (blue)
                ctx.strokeStyle = '#5a8fc4';
                ctx.lineWidth = 3;
                ctx.beginPath();
                for (let units = 0; units <= maxUnits; units += 50) {
                    const revenue = units * price / 100;
                    const x = padding + (units / maxUnits) * graphWidth;
                    const y = height - padding - (revenue / (maxUnits * price / 100)) * graphHeight;
                    if (units === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Cost line (red)
                ctx.strokeStyle = '#c45c4a';
                ctx.lineWidth = 3;
                ctx.beginPath();
                for (let units = 0; units <= maxUnits; units += 50) {
                    const totalCost = fixedCosts + units * variableCost / 100;
                    const x = padding + (units / maxUnits) * graphWidth;
                    const y = height - padding - (totalCost / (maxUnits * price / 100)) * graphHeight;
                    if (units === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();

                // Breakeven point marker
                const beX = padding + (breakeven / maxUnits) * graphWidth;
                const beY = height - padding - (breakeven * price / 100 / (maxUnits * price / 100)) * graphHeight;
                ctx.fillStyle = '#d4a0ff';
                ctx.beginPath();
                ctx.arc(beX, beY, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#d4a0ff';
                ctx.font = 'bold 14px JetBrains Mono';
                ctx.textAlign = 'center';
                ctx.fillText('BE: ' + Math.round(breakeven) + ' units', beX, beY - 20);

                // Legend
                ctx.font = '12px Inter';
                ctx.fillStyle = '#5a8fc4';
                ctx.fillText('Revenue', padding + 80, padding + 20);
                ctx.fillStyle = '#c45c4a';
                ctx.fillText('Total Cost', padding + 180, padding + 20);
            }

            burst(coords) {
                for (let i = 0; i < 30; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    const angle = (Math.random() * Math.PI * 2);
                    const velocity = 5 + Math.random() * 10;
                    const tx = Math.cos(angle) * velocity * 30;
                    const ty = Math.sin(angle) * velocity * 30 - 50;
                    confetti.style.setProperty('--tx', tx + 'px');
                    confetti.style.setProperty('--ty', ty + 'px');
                    confetti.style.left = coords.x + 'px';
                    confetti.style.top = coords.y + 'px';
                    confetti.style.backgroundColor = ['#d4a0ff', '#b07ce8', '#d946ef', '#4a9e6e'][Math.floor(Math.random() * 4)];
                    confetti.style.width = (2 + Math.random() * 4) + 'px';
                    confetti.style.height = (2 + Math.random() * 4) + 'px';
                    confetti.style.borderRadius = '50%';
                    confetti.style.animationDuration = (1.5 + Math.random() * 1) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 2500);
                }
            }

            setupEventListeners() {
                document.getElementById('prevBtn').addEventListener('click', () => this.navigate(-1));
                document.getElementById('nextBtn').addEventListener('click', () => this.navigate(1));

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
                        this.navigate(1);
                        e.preventDefault();
                    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                        this.navigate(-1);
                        e.preventDefault();
                    } else if (e.key === 'End') {
                        this.currentBeat = this.beats.length - 1;
                        this.updateBeats();
                        document.getElementById('beatCurrent').textContent = this.currentBeat + 1;
                        e.preventDefault();
                    } else if (e.key === 'Home') {
                        this.currentBeat = 0;
                        this.updateBeats();
                        document.getElementById('beatCurrent').textContent = 1;
                        e.preventDefault();
                    }
                }, { passive: false });

                let touchStart = 0;
                document.addEventListener('touchstart', (e) => {
                    touchStart = e.touches[0].clientY;
                }, { passive: true });

                document.addEventListener('touchend', (e) => {
                    const touchEnd = e.changedTouches[0].clientY;
                    const diff = touchStart - touchEnd;
                    if (Math.abs(diff) > 50) {
                        this.navigate(diff > 0 ? 1 : -1);
                    }
                }, { passive: true });

                let wheelAccum = 0;
                document.addEventListener('wheel', (e) => {
                    wheelAccum += e.deltaY;
                    if (wheelAccum > 50) {
                        this.navigate(1);
                        wheelAccum = 0;
                    } else if (wheelAccum < -50) {
                        this.navigate(-1);
                        wheelAccum = 0;
                    }
                }, { passive: true });
            }

            navigate(direction) {
                if (this.isAnimating) return;

                let newBeat = this.currentBeat + direction;
                if (newBeat < 0 || newBeat >= this.beats.length) return;

                this.isAnimating = true;
                this.currentBeat = newBeat;

                this.updateBeats();
                document.getElementById('beatCurrent').textContent = this.currentBeat + 1;

                setTimeout(() => {
                    this.isAnimating = false;
                }, this.animationDelay);
            }

            updateBeats() {
                const viewport = document.getElementById('viewport');
                viewport.innerHTML = '';

                const prevBeat = this.currentBeat - 1;
                const currBeat = this.currentBeat;
                const nextBeat = this.currentBeat + 1;

                [prevBeat, currBeat, nextBeat].forEach(idx => {
                    if (idx >= 0 && idx < this.beats.length) {
                        const beatEl = this.beats[idx].render();
                        if (idx === prevBeat) beatEl.classList.add('prev');
                        if (idx === currBeat) beatEl.classList.add('active');
                        viewport.appendChild(beatEl);
                    }
                });
            }

            awardXP(amount) {
                this.xp += amount;
                this.updateXPBar();
            }

            updateXPBar() {
                const level = this.getCurrentLevel();
                const currentLevelObj = LEVELS.find(l => l.name === level);
                const nextLevelObj = LEVELS[LEVELS.findIndex(l => l.name === level) + 1];
                const currentThreshold = currentLevelObj?.threshold || 0;
                const nextThreshold = nextLevelObj?.threshold || 1000;

                const progress = ((this.xp - currentThreshold) / (nextThreshold - currentThreshold)) * 100;

                document.getElementById('xpLevel').textContent = level;
                document.getElementById('xpProgressBar').style.width = `${Math.min(progress, 100)}%`;
                document.getElementById('xpPoints').textContent = `${this.xp} XP`;
            }

            getCurrentLevel() {
                for (let i = LEVELS.length - 1; i >= 0; i--) {
                    if (this.xp >= LEVELS[i].threshold) {
                        return LEVELS[i].name;
                    }
                }
                return 'Greenhorn';
            }

            init() {
                document.getElementById('beatTotal').textContent = this.beats.length;
                this.updateBeats();
                this.updateXPBar();
            }
        }

        window.addEventListener('load', () => {
            new G2GApp();
        });
    </script>
</body>
</html>
